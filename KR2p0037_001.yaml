body:
  text: 魯邦大旱哀公謂孔子子不為我圖之孔子對曰邦大旱毋乃失諸刑與德乎唯之何哉孔子曰庶民知說之事鬼也不知刑與德汝毋愛圭璧幣帛於山川正刑與德孔子出遇子貢曰賜爾聞巷路之言毋乃謂丘之對非歟子貢曰否繄吾子若重命其歟若夫正刑與德以事上天此是哉若夫毋愛圭璧幣帛於山川毋乃不可夫山石以為膚木以為民如天不雨石將焦木將死其欲雨有甚於我又必待吾命乎夫川水以為膚魚以為民如天不雨水將涸魚將死其欲雨有甚於我又必待吾命乎
  hash: sha256:b60356c353fad95551b3c2271be86d0a06d420d496ab48d5d6ed265645b5d350
